name: Jira to Virtualization Spec

on:
  workflow_dispatch:
    inputs:
      issue_key:
        description: "Jira issue key, example KAN-10"
        required: true
        type: string

  repository_dispatch:
    types: [jira-virtualization-request]

jobs:
  fetch-jira:
    runs-on: [self-hosted]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip requests

      - name: Fetch Jira issue
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          ISSUE_KEY: ${{ github.event.inputs.issue_key || github.event.client_payload.issueKey }}
        run: python scripts/fetch_jira_issue.py

      - name: Generate virtualization spec
        env:
          ISSUE_KEY: ${{ github.event.inputs.issue_key || github.event.client_payload.issueKey }}
        run: python scripts/generate_virtualization_spec.py

      - name: Create virtualization in SOAtest MCP
        env:
          ISSUE_KEY: ${{ github.event.inputs.issue_key || github.event.client_payload.issueKey }}
          SOATEST_MCP_URL: ${{ secrets.SOATEST_MCP_URL }}
          SOATEST_MCP_AUTH: ${{ secrets.SOATEST_MCP_AUTH }}
        run: python scripts/create_virtualization_mcp.py

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v4
        with:
          name: virtualization-output
          path: output/
